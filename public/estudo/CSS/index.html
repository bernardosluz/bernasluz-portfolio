<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS</title>
    <!-- 3 - Internal CSS -->
    <style>
      p {
        color: gold;
        font-size: 40px;
      }
    </style>
    <!-- 4 - External CSS -->
    <!-- Cascading Style Sheets -->
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./lists.css" />
  </head>
  <body>
    <!-- 1 - Inline CSS -->
    <h1 style="color: blue">Mudar cor com Inline</h1>
    <h1 style="color: red">Outra cor</h1>

    <!-- 2 - Múltiplas Regras -->
    <h1 style="color: purple; font-size: 50px; border-bottom: 1px solid red">
      Mudar cor e tamanho da fonte
    </h1>

    <!-- 3 - Internal CSS -->
    <p>Eu fui estilizado pelo Internal</p>
    <p>Eu fui estilizado pelo Internal também</p>

    <!-- 4 - External CSS -->
    <h3>External CSS</h3>

    <!-- 5 - Ordem do CSS -->
    <p style="color: red">Ordem do CSS</p>
    <p>Ordem do CSS 2</p>

    <!-- 6 - Múltiplos CSS -->
    <ul>
      <li>Banana</li>
      <li>Maçã</li>
      <li>Abacate</li>
    </ul>
  </body>
</html>
